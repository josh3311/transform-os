<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSFORM OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
            overflow: hidden;
            margin: 0;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            width: 100vw;
        }
        
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00F0FF 0%, #B829F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-enter {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing-indicator span {
            animation: bounce 1.4s infinite ease-in-out both;
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00F0FF;
            border-radius: 50%;
            margin: 0 2px;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        
        .hover-lift {
            transition: all 0.3s;
        }
        
        .hover-lift:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0, 240, 255, 0.3);
        }
        
        input, select, textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00F0FF;
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00F0FF 0%, #B829F7 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 240, 255, 0.5);
        }
        
        .sidebar-item {
            transition: all 0.3s;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            color: #9CA3AF;
        }
        
        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .sidebar-item.active {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.2) 0%, transparent 100%);
            color: #00F0FF;
            border-left: 3px solid #00F0FF;
        }
        
        .medal {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s;
        }
        
        .medal:hover {
            transform: scale(1.2) rotate(10deg);
        }
        
        .medal.locked {
            background: #1F2937;
            opacity: 0.5;
        }
        
        .medal.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); box-shadow: 0 0 20px rgba(205, 127, 50, 0.5); }
        .medal.silver { background: linear-gradient(135deg, #C0C0C0, #808080); box-shadow: 0 0 20px rgba(192, 192, 192, 0.5); }
        .medal.gold { background: linear-gradient(135deg, #FFD700, #FFA500); box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); animation: float 3s ease-in-out infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            color: #EF4444;
            border-radius: 12px;
            transition: all 0.3s;
            width: 100%;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }
        
        .celebration {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: rgba(0,0,0,0.8);
            animation: fadeIn 0.5s;
        }
        
        .thinking-box {
            background: rgba(0, 240, 255, 0.05);
            border-left: 3px solid #00F0FF;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            color: #00F0FF;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="root" class="app-container"></div>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyB7U9nscK-mvUrtza6RH6Y7HlF-BCWceZU",
            authDomain: "transform-os.firebaseapp.com",
            projectId: "transform-os",
            storageBucket: "transform-os.firebasestorage.app",
            messagingSenderId: "218608736503",
            appId: "1:218608736503:web:d9f56950e9f38284c89bf2"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Initialize Three.js background
        const initThreeJS = () => {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Create particles
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 100;
            const posArray = new Float32Array(particlesCount * 3);
            
            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20;
            }
            
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.05,
                color: 0x00F0FF,
                transparent: true,
                opacity: 0.8,
            });
            
            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);
            
            // Add geometric shapes
            const geometries = [
                new THREE.TetrahedronGeometry(0.3),
                new THREE.OctahedronGeometry(0.2),
                new THREE.IcosahedronGeometry(0.15)
            ];
            
            const shapes = [];
            const colors = [0x00F0FF, 0xB829F7, 0xFF6B35];
            
            for(let i = 0; i < 30; i++) {
                const geometry = geometries[Math.floor(Math.random() * geometries.length)];
                const material = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 10
                );
                
                scene.add(mesh);
                shapes.push({
                    mesh,
                    rotSpeed: {
                        x: (Math.random() - 0.5) * 0.02,
                        y: (Math.random() - 0.5) * 0.02
                    }
                });
            }
            
            camera.position.z = 5;
            
            // Mouse tracking
            let mouseX = 0;
            let mouseY = 0;
            
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            
            // Animation loop
            const animate = () => {
                requestAnimationFrame(animate);
                
                particlesMesh.rotation.y += 0.001;
                particlesMesh.rotation.x += 0.0005;
                
                shapes.forEach(shape => {
                    shape.mesh.rotation.x += shape.rotSpeed.x;
                    shape.mesh.rotation.y += shape.rotSpeed.y;
                    
                    // Mouse interaction
                    shape.mesh.position.x += (mouseX * 2 - shape.mesh.position.x) * 0.01;
                    shape.mesh.position.y += (mouseY * 2 - shape.mesh.position.y) * 0.01;
                });
                
                renderer.render(scene, camera);
            };
            
            animate();
            
            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
        
        // ENHANCED Smart AI Class with Thinking, Memory, and Task Execution
        class SmartAI {
            constructor() {
                this.memory = {
                    conversationHistory: [],
                    context: {},
                    userPreferences: {},
                    lastAction: null
                };
                this.maxHistory = 10;
            }

            // Advanced thinking process
            think(input, userData) {
                const thoughts = [];
                
                // 1. Analyze input
                thoughts.push(`Analyzing: "${input.substring(0, 30)}${input.length > 30 ? '...' : ''}"`);
                
                // 2. Extract entities
                const entities = this.extractEntities(input);
                if (entities.numbers.length > 0) thoughts.push(`Found numbers: [${entities.numbers.join(', ')}]`);
                if (entities.dates.length > 0) thoughts.push(`Found dates: [${entities.dates.join(', ')}]`);
                if (entities.tasks.length > 0) thoughts.push(`Found tasks: [${entities.tasks.join(', ')}]`);
                
                // 3. Check context from previous messages
                const contextHint = this.memory.conversationHistory.length > 0 
                    ? `Previous context: ${this.memory.conversationHistory[this.memory.conversationHistory.length - 1].substring(0, 20)}...`
                    : 'New conversation';
                thoughts.push(contextHint);
                
                // 4. Determine intent complexity
                const intent = this.classifyIntent(input);
                thoughts.push(`Intent detected: ${intent.type} (confidence: ${intent.confidence})`);
                
                // 5. Check if action needed
                const action = this.determineAction(intent, entities, userData);
                if (action) {
                    thoughts.push(`Action required: ${action.type} (${action.description})`);
                }
                
                // 6. Search user data if needed
                if (intent.type === 'QUERY_DATA' || intent.type === 'STATUS_CHECK') {
                    const searchResults = this.searchUserData(intent, userData);
                    thoughts.push(`Searched data: ${searchResults.found ? 'Found relevant info' : 'No specific data found'}`);
                }
                
                return {
                    thoughts: thoughts.join(' → '),
                    entities,
                    intent,
                    action,
                    timestamp: new Date().toISOString()
                };
            }

            extractEntities(text) {
                const lower = text.toLowerCase();
                
                // Extract numbers (including "5k" -> 5000)
                const numberMatches = text.match(/(\d+\.?\d*)\s*(k|thousand|hundred)?/gi) || [];
                const numbers = numberMatches.map(n => {
                    const num = parseFloat(n.match(/[\d.]+/)[0]);
                    if (n.toLowerCase().includes('k') || n.toLowerCase().includes('thousand')) return num * 1000;
                    return num;
                }).filter(n => !isNaN(n));

                // Extract dates
                const datePatterns = ['today', 'tomorrow', 'yesterday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
                const dates = datePatterns.filter(d => lower.includes(d));

                // Extract potential task descriptions
                const taskIndicators = ['add', 'create', 'new', 'task', 'todo', 'remind me to', 'buy', 'get', 'call', 'email'];
                const tasks = [];
                taskIndicators.forEach(indicator => {
                    const idx = lower.indexOf(indicator);
                    if (idx !== -1) {
                        const after = text.substring(idx + indicator.length).trim();
                        const cleanTask = after.split(/[.,!?]|and|then/)[0].trim();
                        if (cleanTask.length > 3) tasks.push(cleanTask);
                    }
                });

                return { numbers, dates, tasks, raw: text };
            }

            classifyIntent(text) {
                const lower = text.toLowerCase().trim();
                
                const patterns = {
                    ADD_TASK: { patterns: [/add\s+(.+)/i, /create\s+task/i, /new\s+task/i, /remind\s+me\s+to/i, /buy\s+(.+)/i, /get\s+(.+)/i], confidence: 0 },
                    COMPLETE_TASK: { patterns: [/done\s+with/i, /completed/i, /finish/i, /mark.*done/i, /check\s+off/i], confidence: 0 },
                    UPDATE_STEPS: { patterns: [/add\s+(\d+)\s*steps?/i, /walked\s+(\d+)/i, /(\d+)\s*steps/i, /update\s+steps/i], confidence: 0 },
                    QUERY_STEPS: { patterns: [/how\s+many\s+steps/i, /step\s+count/i, /walk/i, /activity/i], confidence: 0 },
                    QUERY_TASKS: { patterns: [/what.*tasks/i, /what.*todo/i, /what.*do/i, /pending/i, /my\s+list/i], confidence: 0 },
                    MEAL_SUGGESTION: { patterns: [/what.*eat/i, /hungry/i, /meal/i, /food/i, /recipe/i, /diet/i], confidence: 0 },
                    WORKOUT_PLAN: { patterns: [/workout/i, /exercise/i, /gym/i, /train/i, /fitness/i, /burn\s+calories/i], confidence: 0 },
                    MOTIVATION: { patterns: [/motivate/i, /tired/i, /lazy/i, /hard/i, /struggling/i, /give\s+up/i], confidence: 0 },
                    GREETING: { patterns: [/^(hi|hello|hey|yo)\s*$/i, /good\s+(morning|afternoon|evening)/i], confidence: 0 },
                    ANALYTICS: { patterns: [/progress/i, /how\s+am\s+i\s+doing/i, /stats/i, /report/i, /analyze/i], confidence: 0 }
                };

                let bestIntent = { type: 'GENERAL', confidence: 0.3 };

                for (const [intentName, data] of Object.entries(patterns)) {
                    let matches = 0;
                    data.patterns.forEach(pattern => {
                        if (pattern.test(lower)) matches++;
                    });
                    const confidence = Math.min(matches * 0.4 + 0.2, 0.95);
                    if (confidence > bestIntent.confidence) {
                        bestIntent = { type: intentName, confidence };
                    }
                }

                // Context boost
                if (this.memory.lastAction === 'ADD_TASK' && lower.includes('yes')) {
                    bestIntent = { type: 'CONFIRMATION', confidence: 0.9 };
                }

                return bestIntent;
            }

            determineAction(intent, entities, userData) {
                const actions = [];
                
                if (intent.type === 'ADD_TASK' && entities.tasks.length > 0) {
                    actions.push({
                        type: 'ADD_TODO',
                        payload: {
                            title: entities.tasks[0],
                            priority: entities.numbers[0] || 'normal',
                            date: new Date().toISOString().split('T')[0]
                        },
                        description: `Add todo: "${entities.tasks[0]}"`
                    });
                }
                
                if (intent.type === 'COMPLETE_TASK') {
                    // Try to find matching task
                    const taskName = entities.tasks[0] || entities.raw;
                    actions.push({
                        type: 'COMPLETE_TODO',
                        payload: { searchTerm: taskName },
                        description: `Mark matching task as complete`
                    });
                }
                
                if (intent.type === 'UPDATE_STEPS' && entities.numbers.length > 0) {
                    const amount = entities.numbers[0];
                    actions.push({
                        type: 'UPDATE_STEPS',
                        payload: { amount: amount },
                        description: `Add ${amount} steps to activity tracker`
                    });
                }

                if (intent.type === 'QUERY_TASKS') {
                    actions.push({
                        type: 'SEARCH_TODOS',
                        payload: { filter: 'pending' },
                        description: 'Retrieve pending tasks'
                    });
                }

                return actions.length > 0 ? actions[0] : null;
            }

            searchUserData(intent, userData) {
                if (!userData) return { found: false, data: null };
                
                const results = {
                    found: true,
                    stats: {},
                    insights: []
                };

                // Analyze steps
                if (userData.steps !== undefined) {
                    results.stats.steps = userData.steps;
                    results.stats.goalProgress = (userData.steps / 10000 * 100).toFixed(1);
                    if (userData.steps > 8000) results.insights.push('On track for 10k goal');
                    if (userData.steps < 2000) results.insights.push('Low activity detected');
                }

                // Analyze todos
                if (userData.todos) {
                    const pending = userData.todos.filter(t => !t.completed).length;
                    const completed = userData.todos.filter(t => t.completed).length;
                    results.stats.pendingTasks = pending;
                    results.stats.completedTasks = completed;
                    results.stats.productivityRate = pending + completed > 0 
                        ? (completed / (pending + completed) * 100).toFixed(0) 
                        : 0;
                }

                // Weight analysis
                if (userData.weight && userData.goalWeight) {
                    const diff = userData.weight - userData.goalWeight;
                    results.stats.weightDiff = diff;
                    if (diff <= 0) results.insights.push('Goal weight achieved!');
                    else results.insights.push(`${diff}kg to goal`);
                }

                return results;
            }

            generateResponse(input, userData) {
                // 1. THINKING PHASE
                const analysis = this.think(input, userData);
                
                // 2. Store in memory
                this.memory.conversationHistory.push(input);
                if (this.memory.conversationHistory.length > this.maxHistory) {
                    this.memory.conversationHistory.shift();
                }

                // 3. EXECUTE & GENERATE
                let content = '';
                let quickReplies = [];
                const name = userData?.name || 'Warrior';

                // Handle actions first
                if (analysis.action) {
                    switch(analysis.action.type) {
                        case 'ADD_TODO':
                            content = `✅ Task Created!\n\nI've added "${analysis.action.payload.title}" to your list for today.\n\nNeed to add more? Just tell me what else.`;
                            quickReplies = ['Add another', 'Show my tasks', 'Mark it done'];
                            this.memory.lastAction = 'ADD_TASK';
                            break;
                            
                        case 'COMPLETE_TODO':
                            content = `✓ Task Completed!\n\nI'll mark "${analysis.action.payload.searchTerm}" as done. Great productivity!`;
                            quickReplies = ['What\'s next?', 'Add new task', 'Show progress'];
                            break;
                            
                        case 'UPDATE_STEPS':
                            content = `📊 Steps Updated!\n\nAdded ${analysis.action.payload.amount} steps to your daily count.\n\nCurrent total: ~${(userData?.steps || 0) + analysis.action.payload.amount} steps`;
                            quickReplies = ['Add more steps', 'How many calories?', 'Show progress'];
                            break;
                            
                        case 'SEARCH_TODOS':
                            const pending = userData?.todos?.filter(t => !t.completed) || [];
                            if (pending.length === 0) {
                                content = `🎉 All Clear!\n\nYou have no pending tasks. Time to set new goals?`;
                                quickReplies = ['Create task', 'Check progress', 'Motivate me'];
                            } else {
                                const nextTasks = pending.slice(0, 3).map(t => `• ${t.title}`).join('\n');
                                content = `📋 Pending Tasks (${pending.length} total):\n\n${nextTasks}${pending.length > 3 ? '\n• ...and ' + (pending.length - 3) + ' more' : ''}\n\nWhich one should we tackle?`;
                                quickReplies = ['Mark first as done', 'Add task', 'Workout instead'];
                            }
                            break;
                    }
                } else {
                    // No action - provide intelligent response based on intent
                    switch(analysis.intent.type) {
                        case 'QUERY_STEPS':
                            const steps = userData?.steps || 0;
                            const calories = Math.floor(steps * 0.04);
                            const distance = (steps * 0.0008).toFixed(2);
                            content = `👟 Activity Analysis:\n\nSteps: ${steps.toLocaleString()}/10,000\nCalories: ~${calories} kcal\nDistance: ~${distance} km\n\n${steps > 8000 ? '🔥 Excellent! You\'re crushing it today.' : steps > 4000 ? '⚡ Good momentum. Push for 10k!' : '🌱 Fresh start. Every step counts!'}`;
                            quickReplies = ['Add 1000 steps', 'What should I eat?', 'Give me a workout'];
                            break;
                            
                        case 'MEAL_SUGGESTION':
                            const stepLevel = (userData?.steps || 0) > 8000 ? 'high' : 'moderate';
                            content = `🍽️ Nutrition Plan (${stepLevel} activity day):\n\nBased on your ${userData?.steps || 0} steps:\n• Protein: Grilled salmon (200g)\n• Carbs: Quinoa or sweet potato\n• Fats: Avocado + olive oil\n• Veggies: Broccoli, spinach\n\nTotal: ~550 cal | 40g protein\nPerfect for recovery!`;
                            quickReplies = ['Track calories', 'Vegetarian option', 'Quick snack?'];
                            break;
                            
                        case 'WORKOUT_PLAN':
                            content = `💪 Smart Workout Generator:\n\nAnalyzing your current ${userData?.steps || 0} steps...\n\n${(userData?.steps || 0) > 10000 ? 'Recovery Day:\n• 15min yoga\n• Foam rolling\n• Light stretching' : 'High-Intensity:\n• 5min warmup\n• 4 rounds:\n  - 15 burpees\n  - 20 squats\n  - 10 push-ups\n• 5min cooldown'}\n\nBurn: ~${(userData?.steps || 0) > 10000 ? '150' : '400'} calories`;
                            quickReplies = ['Start workout', 'Easier option', 'Add to tasks'];
                            break;
                            
                        case 'MOTIVATION':
                            const progress = ((userData?.steps || 0) / 10000 * 100).toFixed(0);
                            content = `🔥 ${name}, Reality Check:\n\nYou've moved ${(userData?.steps || 0).toLocaleString()} times today.\nThat's ${progress}% of your goal.\n\n${progress < 50 ? 'The gap between who you are and who you want to be is closing with every step. Close it faster.' : 'You\'re in the top 20% of people right now. Keep the momentum. Don\'t break the chain.'}\n\nYour future self is watching. Make them proud.`;
                            quickReplies = ['Track steps', 'What\'s next?', 'I need food'];
                            break;
                            
                        case 'ANALYTICS':
                            const searchData = this.searchUserData(analysis.intent, userData);

            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [showThinking, setShowThinking] = useState(true); // Toggle to show/hide thought process
            const messagesEnd = useRef(null);
            
            useEffect(() => {
                messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);
            
            const send = async (text = input) => {
                if (!text.trim() || !user) return;
                
                // Add user message
                setMessages(prev => [...prev, { type: 'user', content: text }]);
                setInput('');
                setIsTyping(true);
                
                // Get AI response with thinking
                const result = smartAI.generateResponse(text, userData);
                
                // Simulate thinking time based on complexity
                const thinkingTime = result.actions.length > 0 ? 1500 : 800;
                
                setTimeout(async () => {
                    // Execute any actions
                    if (result.actions.length > 0 && user) {
                        const actionResults = await smartAI.executeActions(result.actions, user.uid);
                        
                        // Update message with action confirmation
                        const actionText = actionResults.map(r => {
                            if (r.type === 'ADD_TODO' && r.success) return `\n✓ Created task`;
                            if (r.type === 'COMPLETE_TODO' && r.success) return `\n✓ Completed ${r.count} task(s)`;
                            if (r.type === 'UPDATE_STEPS' && r.success) return `\n✓ Steps updated to ${r.newTotal}`;
                            return '';
                        }).join('');
                        
                        result.content += actionText;
                    }
                    
                    setMessages(prev => [...prev, { 
                        type: 'ai', 
                        content: result.content, 
                        thinking: result.thinking,
                        showThinking: false,
                        quickReplies: result.quickReplies 
                    }]);
                    setIsTyping(false);
                }, thinkingTime);
            };
            
            const toggleThinking = (index) => {
                setMessages(prev => prev.map((msg, i) => 
                    i === index ? { ...msg, showThinking: !msg.showThinking } : msg
                ));
            };
            
            return (
                <div className="h-full flex flex-col animate-fade-in">
                    <div className="glass border-b border-white/10 p-6 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-cyan-400 flex items-center justify-center text-2xl">🧠</div>
                            <div>
                                <h3 className="font-bold text-xl">Transform AI</h3>
                                <p className="text-sm text-gray-400 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                    Enhanced Mode • Context-Aware • Task-Enabled
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 text-sm text-gray-400">
                            <span>Show Thinking</span>
                            <button 
                                onClick={() => setShowThinking(!showThinking)}
                                className={`w-12 h-6 rounded-full transition-colors ${showThinking ? 'bg-cyan-400' : 'bg-gray-700'} relative`}
                            >
                                <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-all ${showThinking ? 'left-7' : 'left-1'}`} />
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-4">
                        {messages.map((msg, idx) => (
                            <div key={idx} className={`message-enter flex gap-3 ${msg.type === 'user' ? 'flex-row-reverse' : ''}`}>
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${msg.type === 'user' ? 'bg-gray-700' : 'bg-gradient-to-br from-purple-500 to-cyan-400'}`}>
                                    {msg.type === 'user' ? '👤' : '🧠'}
                                </div>
                                <div className={`max-w-[80%] space-y-2 ${msg.type === 'user' ? 'items-end' : 'items-start'}`}>
                                    {msg.type === 'ai' && msg.thinking && showThinking && (
                                        <div 
                                            className="thinking-box cursor-pointer hover:opacity-80 transition-opacity"
                                            onClick={() => toggleThinking(idx)}
                                        >
                                            <div className="flex items-center gap-2 mb-1 opacity-70">
                                                <span className="text-xs">⚡ THINKING PROCESS</span>
                                                <span className="text-xs">(click to hide)</span>
                                            </div>
                                            <div className="text-xs opacity-90">{msg.thinking}</div>
                                        </div>
                                    )}
                                    <div className={`p-4 rounded-2xl whitespace-pre-line text-sm ${msg.type === 'user' ? 'bg-cyan-400 text-black font-medium rounded-tr-sm' : 'glass rounded-tl-sm'}`}>
                                        {msg.content}
                                    </div>
                                    {msg.quickReplies && (
                                        <div className="flex flex-wrap gap-2">
                                            {msg.quickReplies.map((reply, i) => (
                                                <button key={i} onClick={() => send(reply)} className="px-3 py-1.5 bg-white/10 hover:bg-cyan-400/20 border border-white/10 rounded-full text-xs text-cyan-300 transition-all">
                                                    {reply}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex gap-3">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-cyan-400 flex items-center justify-center">🧠</div>
                                <div className="glass p-4 rounded-2xl rounded-tl-sm flex items-center gap-2">
                                    <div className="typing-indicator"><span></span><span></span><span></span></div>
                                    <span className="text-gray-400 text-sm">Processing...</span>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEnd} />
                    </div>
                    
                    <div className="glass border-t border-white/10 p-6">
                        <div className="max-w-4xl mx-auto flex gap-3">
                            <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && !isTyping && send()} placeholder="Try: 'Add buy groceries to my list' or 'Log 1000 steps'..." disabled={isTyping} />
                            <button onClick={() => send()} disabled={isTyping || !input.trim()} className="btn-primary disabled:opacity-50">{isTyping ? '...' : 'Send'}</button>
                        </div>
                        <div className="max-w-4xl mx-auto mt-2 text-xs text-gray-500 text-center">
                            Enhanced AI can create tasks, update steps, search your data, and maintain conversation context
                        </div>
                    </div>
                </div>
            );
        };
        
        // Main App
        const App = () => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('vitals');
            const [threeInitialized, setThreeInitialized] = useState(false);
            
            useEffect(() => {
                // Initialize Three.js after mount
                if (!threeInitialized) {
                    initThreeJS();
                    setThreeInitialized(true);
                }
                
                const unsub = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        const doc = await db.collection('users').doc(u.uid).get();
                        if (doc.exists) {
                            const data = doc.data();
                            const todosSnap = await db.collection('users').doc(u.uid).collection('todos').get();
                            data.todos = todosSnap.docs.map(d => d.data());
                            setUserData(data);
                        }
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, [threeInitialized]);
            
            const logout = async () => {
                await auth.signOut();
                setUser(null);
                setUserData(null);
            };
            
            if (loading) return <div className="h-full w-full flex items-center justify-center text-cyan-400 text-2xl">Loading...</div>;
            if (!user) return <Auth onAuth={() => {}} />;
            
            const tabs = [
                { id: 'vitals', label: 'Vitals', icon: '❤️' },
                { id: 'time', label: 'Time', icon: '🕐' },
                { id: 'ai', label: 'AI Coach', icon: '🧠' }
            ];
            
            return (
                <div className="h-full w-full flex">
                    <div className="w-20 md:w-72 glass border-r border-white/10 flex flex-col">
                        <div className="p-6 border-b border-white/10">
                            <h1 className="font-bold text-xl hidden md:block">TRANSFORM<span className="text-cyan-400">.OS</span></h1>
                            <h1 className="font-bold text-xl md:hidden text-cyan-400">T</h1>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-2">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`sidebar-item ${activeTab === tab.id ? 'active' : ''}`}>
                                    <span className="text-2xl">{tab.icon}</span>
                                    <span className="hidden md:block font-medium">{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-4 border-t border-white/10">
                            <div className="hidden md:block mb-4 p-4 glass rounded-xl">
                                <p className="text-sm font-medium truncate">{userData?.name || 'User'}</p>
                                <p className="text-xs text-gray-500 truncate">{user.email}</p>
                            </div>
                            <button onClick={logout} className="logout-btn">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                <span className="hidden md:block font-medium">Logout</span>
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-hidden">
                        {activeTab === 'vitals' && <Vitals user={user} userData={userData} updateData={setUserData} />}
                        {activeTab === 'time' && <TimeCenter user={user} />}
                        {activeTab === 'ai' && <AIChat userData={userData} user={user} />}
                    </div>
                </div>
            );
        };
        
        // Mount React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
